name: Backend CI/CD

on:
  push:
    branches: [ main ]
    # ONLY trigger if files in the 'backend' folder change
    paths:
      - 'api-gateway/**'
      - 'user-service/**'
      - 'habit-service/**'
      - 'club-service/**'
      - 'analytics-service/**'
      - 'task-service/**'
      - 'shared/**'
      - 'docker-compose.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /path/to/your/project
            git pull origin main
            docker compose up -d --build api-gateway user-service habit-service club-service analytics-service task-service