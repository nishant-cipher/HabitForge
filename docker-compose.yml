version: '3.8'

services:
  # MongoDB Database - COMMENTED OUT - Using local MongoDB
  # mongodb:
  #   image: mongo:6.0
  #   container_name: habitforge-mongodb
  #   restart: unless-stopped
  #   ports:
  #     - "27017:27017"
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: habitforge
  #     MONGO_INITDB_ROOT_PASSWORD: habitforge123
  #     MONGO_INITDB_DATABASE: habitforge
  #   volumes:
  #     - mongodb_data:/data/db
  #     - mongodb_config:/data/configdb
  #   networks:
  #     - habitforge-network
  #   healthcheck:
  #     test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/habitforge --quiet
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7.0-alpine
    container_name: habitforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass habitforge123
    volumes:
      - redis_data:/data
    networks:
      - habitforge-network
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway Service
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: habitforge-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: habitforge123
      USER_SERVICE_URL: http://user-service:3001
      HABIT_SERVICE_URL: http://habit-service:3002
      CLUB_SERVICE_URL: http://club-service:3003
      ANALYTICS_SERVICE_URL: http://analytics-service:3004
    depends_on:
      - redis
      - user-service
      - habit-service
      - club-service
      - analytics-service
    networks:
      - habitforge-network
    volumes:
      - ./api-gateway:/app
      - /app/node_modules
    command: npm run dev

  # User Service
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: habitforge-user-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      MONGODB_URI: mongodb://myAdmin:Phoenix43@129.154.38.176:27017/habitforge?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: habitforge123
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 7d
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - habitforge-network
    volumes:
      - ./user-service:/app
      - /app/node_modules
    command: npm run dev

  # Habit & Gamification Service
  habit-service:
    build:
      context: ./habit-service
      dockerfile: Dockerfile
    container_name: habitforge-habit-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      MONGODB_URI: mongodb://myAdmin:Phoenix43@129.154.38.176:27017/habitforge?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: habitforge123
      USER_SERVICE_URL: http://user-service:3001
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - habitforge-network
    volumes:
      - ./habit-service:/app
      - /app/node_modules
    command: npm run dev

  # Club & Leaderboard Service
  club-service:
    build:
      context: ./club-service
      dockerfile: Dockerfile
    container_name: habitforge-club-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: development
      PORT: 3003
      MONGODB_URI: mongodb://myAdmin:Phoenix43@129.154.38.176:27017/habitforge?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: habitforge123
      USER_SERVICE_URL: http://user-service:3001
      HABIT_SERVICE_URL: http://habit-service:3002
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - habitforge-network
    volumes:
      - ./club-service:/app
      - /app/node_modules
    command: npm run dev

  # Analytics & Worker Service
  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: habitforge-analytics-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: development
      PORT: 3004
      MONGODB_URI: mongodb://myAdmin:Phoenix43@129.154.38.176:27017/habitforge?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: habitforge123
      USER_SERVICE_URL: http://user-service:3001
      HABIT_SERVICE_URL: http://habit-service:3002
      CLUB_SERVICE_URL: http://club-service:3003
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - habitforge-network
    volumes:
      - ./analytics-service:/app
      - /app/node_modules
    command: npm run dev

networks:
  habitforge-network:
    driver: bridge

volumes:
  mongodb_data:
  mongodb_config:
  redis_data:
