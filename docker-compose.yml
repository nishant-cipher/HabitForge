version: '3.8'

services:

  # Redis Cache & Queue
  redis:
    image: redis:7.0-alpine
    container_name: habitforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - habitforge-network
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway Service
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: habitforge-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-gateway.rule=Host(`${CLIENT_URL}`)"
      - "traefik.http.routers.api-gateway.entrypoints=web"
      - "traefik.http.services.api-gateway.loadbalancer.server.port=3000"
    env_file:
      - .env
    depends_on:
      - redis
      - user-service
      - habit-service
      - club-service
      - analytics-service
      - task-service
    networks:
      - habitforge-network

  # User Service
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: habitforge-user-service
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - habitforge-network

  # Habit & Gamification Service
  habit-service:
    build:
      context: ./habit-service
      dockerfile: Dockerfile
    container_name: habitforge-habit-service
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - habitforge-network

  # Club & Leaderboard Service
  club-service:
    build:
      context: ./club-service
      dockerfile: Dockerfile
    container_name: habitforge-club-service
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - habitforge-network

  # Analytics & Worker Service
  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: habitforge-analytics-service
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - habitforge-network

  # Task Service
  task-service:
    build:
      context: ./task-service
      dockerfile: Dockerfile
    container_name: habitforge-task-service
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
      - user-service
    networks:
      - habitforge-network

  # Traefik Reverse Proxy
  traefik:
    image: traefik:v2.11
    container_name: habitforge-traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=${SMTP_USER}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    networks:
      - habitforge-network

networks:
  habitforge-network:
    driver: bridge

volumes:
  redis_data:
